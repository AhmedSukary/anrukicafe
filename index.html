<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnrukiShop</title>
    <link rel="stylesheet" href="CSS/index.css" />
</head>

<body>
    <div id="tableBox" class="hidden">
        
    </div>

    <section id="section">
        <div id="tables" class="tables">
        </div>
        <div id="order" class="order">
            <span class="titel">Order</span>
            <div class="status">
                <div class="details">
                    <div>ID: <span id="orderId">???</span></div>
                    <div>Table Number: <span id="tableNumber">???</span></div>
                </div>
                <button id="canselOrder"><img
                        src="imgs/external-ban-miscellaneous-elements-glyph-bartama-glyph-64-bartama-graphic.png"
                        alt=""></button>
            </div>
            <div id="orderItems" class="items"></div>
            <div class="print">
                <div>Total Amount: <span id="orderTotalAmount">0₺</span></div>
                <button id="sendOrder"><img src="imgs/29968.png" alt=""></button>
            </div>
        </div>
        <div class="Categories">
            <button class="categoryBtn active">1</button>
            <button class="categoryBtn">2</button>
            <button class="categoryBtn">3</button>
            <button class="categoryBtn">4</button>
            <button class="categoryBtn">5</button>
            <button class="categoryBtn">6</button>
            <button class="categoryBtn">7</button>
            <button class="categoryBtn">8</button>
            <button class="categoryBtn">9</button>
            <button class="categoryBtn">10</button>
            <button class="categoryBtn">11</button>
            <button class="categoryBtn">12</button>
            <button class="categoryBtn">13</button>
            <button class="categoryBtn">14</button>
            <button class="categoryBtn">15</button>
        </div>
        <div id="products" class="products"> </div>
    </section>

    <footer id="footer">
        <div>
            <a><img src="imgs/1077114.png" alt=""><Span id="useingSystemName">???</Span></a>
        </div>
        <div>
            <a id="logout"><img src="imgs/271-2715393_logout-comments-icon.png" alt="">Logout</a>
        </div>
    </footer>

    <script type="module" src="JS/main.js"></script>
</body>

</html>
